version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: intellidesk_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: intellidesk_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: intellidesk_server
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:password123@postgres:5432/intellidesk_db?schema=public
      - JWT_ACCESS_SECRET=super_access_token_secret_key_12345
      - JWT_REFRESH_SECRET=super_refresh_token_secret_key_67890
      - CLIENT_URL=http://localhost:5173
      - PORT=5000
    depends_on:
      - postgres

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: intellidesk_client
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - server

volumes:
  pgdata:
